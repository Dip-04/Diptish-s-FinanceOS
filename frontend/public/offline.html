<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F7F4EF" />
    <title>Diptish Finance OS Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background:
          radial-gradient(circle at 10% 0%, rgba(233,196,106,.2), transparent 22rem),
          radial-gradient(circle at 90% 0%, rgba(42,157,143,.12), transparent 24rem),
          #F7F4EF;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid rgba(17,24,39,.08);
        border-radius: 32px;
        padding: 28px;
        background: #FFFFFF;
        box-shadow: 0 18px 45px rgba(17,24,39,.08);
      }
      .mark {
        width: 64px;
        height: 64px;
        border-radius: 22px;
        background: #111827;
        margin-bottom: 20px;
      }
      h1 { margin: 0; font-size: 30px; line-height: 1.1; }
      p { color: #6B7280; line-height: 1.6; }
      a {
        display: inline-flex;
        margin-top: 14px;
        min-height: 48px;
        align-items: center;
        border-radius: 18px;
        padding: 0 18px;
        background: #111827;
        color: #FFFFFF;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"></div>
      <h1>You are offline</h1>
      <p>Diptish Finance OS is ready for offline-first workflows. Reconnect to sync queued finance updates.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>

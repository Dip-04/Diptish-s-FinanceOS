<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C6FF3D" />
    <title>Diptish Finance OS Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff;
        background:
          radial-gradient(circle at 10% 0%, rgba(198,255,61,.22), transparent 22rem),
          radial-gradient(circle at 90% 0%, rgba(255,107,107,.16), transparent 24rem),
          #0B0D10;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 32px;
        padding: 28px;
        background: rgba(255,255,255,.07);
        box-shadow: 0 24px 90px rgba(0,0,0,.42);
        backdrop-filter: blur(20px);
      }
      .mark {
        width: 64px;
        height: 64px;
        border-radius: 22px;
        background: linear-gradient(135deg, #C6FF3D, #F5C76B);
        margin-bottom: 20px;
      }
      h1 { margin: 0; font-size: 30px; line-height: 1.1; }
      p { color: #A1A1AA; line-height: 1.6; }
      a {
        display: inline-flex;
        margin-top: 14px;
        min-height: 48px;
        align-items: center;
        border-radius: 18px;
        padding: 0 18px;
        background: #C6FF3D;
        color: #111111;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark"></div>
      <h1>You are offline</h1>
      <p>Diptish Finance OS is ready for offline-first workflows. Reconnect to sync queued finance updates.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
